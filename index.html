<!DOCTYPE html>
<html lang="es">
<head>
  <title>RA Geomática - Sur RD</title>
  <meta charset="utf-8">

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body { margin: 0; font-family: sans-serif; }

    model-viewer {
      width: 100%;
      height: 90vh;
      background-color: #f0f0f0;
    }

    .info {
      padding: 10px;
      text-align: center;
    }
  </style>
</head>

<body>

<model-viewer
  src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
  ar
  ar-modes="webxr scene-viewer quick-look"
  camera-controls
  auto-rotate
  shadow-intensity="1">

  <button slot="ar-button"
    style="position:absolute; top:16px; right:16px; padding:10px;">
    Activar RA
  </button>

</model-viewer>

<div class="info">
  <h3>Modelo Digital de Elevación - Sur RD</h3>
  <p>Vista inmersiva en Realidad Aumentada</p>
</div>

</body>
</html>
