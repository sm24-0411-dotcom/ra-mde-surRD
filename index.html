<!DOCTYPE html>
<html>
<head>
  <title>RA MDE Sur RD</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    #map {
      height: 100vh;   /* 🔴 CLAVE */
      width: 100%;
    }

    h1 {
      position: absolute;
      z-index: 1000;
      background: white;
      padding: 8px;
      margin: 10px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h1>Visualización 3D (base MDE)</h1>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  console.log("Inicializando mapa...");

  const map = L.map('map').setView([18.7357, -70.1627], 8);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OSM'
  }).addTo(map);

  L.marker([18.7357, -70.1627])
    .addTo(map)
    .bindPopup("RD - Base del proyecto");
</script>

</body>
</html>
