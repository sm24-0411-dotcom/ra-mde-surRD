<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RA Geomorfología San Cristóbal</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f2f2f2;
text-align:center;
}

h1{
font-size:20px;
padding:10px;
}

model-viewer{
width:100%;
height:80vh;
background:white;
}

p{
padding:10px;
}
</style>
</head>

<body>

<h1>Geomorfología RA - San Cristóbal</h1>

<model-viewer
src="modelo.glb"
ar
ar-modes="webxr scene-viewer quick-look"
camera-controls
auto-rotate
shadow-intensity="1">
<button slot="ar-button">
Activar Realidad Aumentada
</button>
</model-viewer>

<p>Visualización 3D del terreno</p>

</body>
</html>
