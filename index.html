<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RA Geomática - Sur RD</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f2f2f2;
}

model-viewer{
    width:100%;
    height:90vh;
    background:#e8e8e8;
}

.dot{
    width:14px;
    height:14px;
    border-radius:50%;
    border:none;
    background:#d62828;
    box-shadow:0 2px 6px rgba(0,0,0,.35);
}

.label{
    background:white;
    color:#111;
    padding:6px 10px;
    border-radius:6px;
    font-size:12px;
    font-weight:bold;
    white-space:nowrap;
    transform:translate(12px,-18px);
    box-shadow:0 2px 8px rgba(0,0,0,.20);
}

.ar-btn{
    position:absolute;
    top:16px;
    right:16px;
    border:none;
    padding:12px 16px;
    border-radius:8px;
    background:white;
    font-weight:bold;
    box-shadow:0 3px 8px rgba(0,0,0,.25);
}

.footer{
    background:#003366;
    color:white;
    text-align:center;
    padding:12px;
}

.footer h2{
    margin:0;
    font-size:1.1rem;
}

.footer p{
    margin:6px 0 0;
    font-size:.85rem;
}
</style>
</head>

<body>

<model-viewer
src="VillaAltagracia_3D_optimized.glb"
ar
ar-modes="webxr scene-viewer quick-look"
camera-controls
auto-rotate
shadow-intensity="1"
environment-image="neutral">

<button
class="dot"
slot="hotspot-1"
data-position="0.1m 0.08m 0m"
data-normal="0m 1m 0m">

<div class="label">
Morfología en zona de montaña de la provincia San Cristóbal
</div>

</button>

<button slot="ar-button" class="ar-btn">
📱 Activar Realidad Aumentada
</button>

</model-viewer>

<div class="footer">
<h2>Visualización Inmersiva de la Geomorfología Dominicana</h2>
<p>Trabajo Final · Principios Prácticos de la Geomática · UNPHU</p>
</div>

</body>
</html>
