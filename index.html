<!DOCTYPE html>
<html>
<head>
  <title>RA MDE Sur RD - Test</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    #map {
      height: 100vh; /* 🔴 CLAVE para que no salga en blanco */
      width: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // 📍 Centro República Dominicana
  const map = L.map('map').setView([18.7357, -70.1627], 8);

  // 🌍 Capa base (OpenStreetMap)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  // 📌 marcador de prueba
  L.marker([18.7357, -70.1627])
    .addTo(map)
    .bindPopup("República Dominicana - Base del proyecto")
    .openPopup();
</script>

</body>
</html>
